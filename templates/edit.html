<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>予約編集</title>
</head>
<body>

<h1>予約編集</h1>

<form method="post" action="/update/{{ index }}">
  <p>
    <label>予約日</label><br>
    <input type="date" name="date" value="{{ reservation[0] }}">
  </p>

  <p>
    <label>時間</label><br>
    <input type="time" name="time" value="{{ reservation[1] }}">
  </p>

  <p>
    <label>お客様名</label><br>
    <input type="text" name="name" value="{{ reservation[2] }}">
  </p>

  <p>
    <label>メニュー</label><br>
    <input type="text" name="menu" value="{{ reservation[3] }}">
  </p>

  <p>
    <label>メモ</label><br>
    <textarea name="note">{{ reservation[4] }}</textarea>
  </p>

  <button type="submit">保存</button>

</form>
  
<p><a href="/">← 戻る</a></p>

</body>
</html>
